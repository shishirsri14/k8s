apiVersion: batch/v1
kind: Job
metadata:
  name: demo-job
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: batch-task
    spec:
      containers:
      - name: batch-container
        image: busybox:latest
        command: ["sh", "-c", "echo Hello Dosto && sleep 10"]
      restartPolicy: Never
